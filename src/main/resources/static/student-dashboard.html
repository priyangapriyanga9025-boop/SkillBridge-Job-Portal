<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillBridge - Student Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fc;
}

/* HEADER */

header{
    background:#0d6efd;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

header h2{
    font-size:30px;
}

.header-right{
    display:flex;
    align-items:center;
    gap:12px;
}

#userEmail{
    font-weight:bold;
    font-size:16px;
}

/* BUTTONS */

button{
    border:none;
    border-radius:6px;
    cursor:pointer;
    padding:10px 18px;
    color:white;
    font-size:15px;
    transition:.3s;
}

.saved{
    background:#198754;
}

.saved:hover{
    background:#157347;
}

.applied{
    background:#6f42c1;
}

.applied:hover{
    background:#59359c;
}

.profile{
    background:white;
    color:#0d6efd;
    font-weight:bold;
}

.profile:hover{
    background:#ececec;
}

.logout{
    background:#dc3545;
}

.logout:hover{
    background:#bb2d3b;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1200px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.container h2{
    margin-bottom:20px;
}

/* DASHBOARD CARDS */

.stats{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    flex:1;
    background:white;
    border-left:6px solid #0d6efd;
    border-radius:10px;
    padding:20px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h3{
    font-size:36px;
    color:#0d6efd;
}

.card p{
    margin-top:10px;
    color:#666;
    font-weight:bold;
}

/* SEARCH */

#searchBox{
    width:320px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:20px;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
    padding:14px;
}

td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f8f9fa;
}

.saveBtn{
    background:#198754;
    margin:2px;
}

.applyBtn{
    background:#ff9800;
    margin:2px;
}

.saveBtn:hover{
    background:#157347;
}

.applyBtn:hover{
    background:#e68900;
}

</style>

</head>
<body>

<header>

<h2>Student Dashboard</h2>

<div class="header-right">

<span id="userEmail"></span>

<button class="saved"
onclick="window.location.href='saved-jobs.html'">
Saved Jobs
</button>

<button class="applied"
onclick="window.location.href='my-applications.html'">
Applied Jobs
</button>
<button class="profile"
onclick="window.location.href='upload-resume.html'">
Upload Resume
</button>
<button class="profile"
onclick="window.location.href='profile.html'">
Profile
</button>

<button class="logout"
onclick="logout()">
Logout
</button>

</div>

</header>

<div class="container">

<h2>Welcome to SkillBridge</h2>

<div class="stats">

<div class="card">
<h3 id="jobCount">0</h3>
<p>Available Jobs</p>
</div>

<div class="card">
<h3 id="savedCount">0</h3>
<p>Saved Jobs</p>
</div>

<div class="card">
<h3 id="appliedCount">0</h3>
<p>Applied Jobs</p>
</div>

</div>

<h2>Available Jobs</h2>

<input
type="text"
id="searchBox"
placeholder="Search Job Title..."
onkeyup="searchJobs()">

<table>

<thead>

<tr>
<th>S.No</th>
<th>Job Title</th>
<th>Company</th>
<th>Location</th>
<th>Skills</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="jobTable">

</tbody>

</table>

</div>
<script src="api.js"></script>
<script>
    if(localStorage.getItem("studentEmail")==null){
    alert("Please Login First");
    window.location.href="student-login.html";
}
    // Logged in Student Email
document.getElementById("userEmail").innerHTML =
localStorage.getItem("studentEmail");

// Load Dashboard
loadJobs();
loadCounts();

// ================= Dashboard Counts =================

function loadCounts(){

fetch(API_URL + "/jobs")
.then(response=>response.json())
.then(data=>{
document.getElementById("jobCount").innerHTML=data.length;
});

fetch(API_URL + "/savedjobs/all")
.then(response=>response.json())
.then(data=>{
document.getElementById("savedCount").innerHTML=data.length;
})
.catch(()=>{
document.getElementById("savedCount").innerHTML="0";
});

fetch(API_URL + "/applications/apply")
.then(response=>response.json())
.then(data=>{
document.getElementById("appliedCount").innerHTML=data.length;
})
.catch(()=>{
document.getElementById("appliedCount").innerHTML="0";
});

}

// ================= Load Jobs =================

function loadJobs(){

fetch("http://localhost:8080/jobs")

.then(response=>response.json())

.then(data=>{

if(data.length===0){

document.getElementById("jobTable").innerHTML=
"<tr><td colspan='6'>No Jobs Available</td></tr>";

return;

}

let rows="";
let count=1;

data.forEach(job=>{

rows+=`

<tr>

<td>${count++}</td>

<td>${job.title || ""}</td>

<td>${job.company || ""}</td>

<td>${job.location || ""}</td>

<td>${job.skills || ""}</td>

<td>

<button class="saveBtn"
onclick="saveJob('${job.company}','${job.title}')">

Save

</button>

<button class="applyBtn"
onclick="applyJob(${job.id},
'${job.title || ""}',
'${job.company || ""}')"

Apply

</button>

</td>

</tr>

`;

});

document.getElementById("jobTable").innerHTML=rows;

})

.catch(error=>{

console.log(error);

alert("Unable to load jobs.");

});

}

// ================= Search Jobs =================

function searchJobs(){

let input=document.getElementById("searchBox").value.toLowerCase();

let rows=document.querySelectorAll("#jobTable tr");

rows.forEach(row=>{

let title=row.cells[1].innerText.toLowerCase();

if(title.includes(input)){

row.style.display="";

}else{

row.style.display="none";

}

});

}
// ================= Save Job =================

function saveJob(company,title){

let job={

userEmail:localStorage.getItem("studentEmail"),

company:company,

title:title

};

fetch("http://localhost:8080/savedjobs/save",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(job)

})

.then(response=>response.json())

.then(data=>{

alert("Job Saved Successfully");

loadCounts();

})

.catch(error=>{

console.log(error);

alert("Unable to Save Job");

});

}

// ================= Apply Job =================

function applyJob(id,title,company){

if(!confirm("Do you want to apply for this job?")){
return;
}

let job = {

applicantName: localStorage.getItem("studentEmail"),

company: company,

jobTitle: title,

status: "Applied",

resume: ""

};

fetch("http://localhost:8080/applications/apply",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(job)

})

.then(response=>response.json())

.then(data=>{

alert("Job Applied Successfully");

loadCounts();

})

.catch(error=>{

console.log(error);

alert("Unable to Apply Job");

});

}

// ================= Logout =================

function logout(){

if(confirm("Are you sure you want to Logout?")){

localStorage.clear();

window.location.href="student-login.html";

}

}

</script>

</body>

</html>
