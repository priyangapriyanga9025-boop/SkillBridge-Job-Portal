<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillBridge - User Registration</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#4f8dfd);
}

.register-box{
    width:450px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#0d6efd;
    font-size:34px;
}

.logo p{
    color:#666;
    margin-top:8px;
}

.input-group{
    margin-top:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border:2px solid #0d6efd;
}

button{
    width:100%;
    margin-top:30px;
    padding:14px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#084298;
}

#message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.login-link{
    margin-top:20px;
    text-align:center;
}

.login-link a{
    color:#0d6efd;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">

<h1>SkillBridge</h1>

<p>Create Your Account</p>

</div>

<form id="registerForm">

<div class="input-group">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter your full name"
required>

</div>

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter your password"
required>

</div>

<button type="submit">
Register
</button>

</form>

<p id="message"></p>

<div class="login-link">

Already have an account?

<a href="login.html">
Login Here
</a>

</div>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(name==="" || email==="" || password===""){

document.getElementById("message").style.color="red";
document.getElementById("message").innerHTML="Please fill all fields.";

return;

}

const user={

name:name,
email:email,
password:password

};

fetch("/users/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(user)

})

.then(response=>response.json())

.then(data=>{

document.getElementById("message").style.color="green";
document.getElementById("message").innerHTML="Registration Successful! Redirecting...";

setTimeout(function(){

window.location.href="login.html";

},1500);

})

.catch(function(){

document.getElementById("message").style.color="red";
document.getElementById("message").innerHTML="Registration Failed.";

});

});

</script>

</body>

</html>
