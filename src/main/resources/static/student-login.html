<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f6ff;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    color:#007bff;
    margin-bottom:20px;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:95%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

a{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#007bff;
}

a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<button onclick="login()">
Login
</button>

<a href="register.html">
New User? Register Here
</a>

</div>

<script>

function login(){

let email=document.getElementById("email").value.trim();

if(email===""){

alert("Please enter your email.");

return;

}

localStorage.setItem("studentEmail",email);

alert("Login Successful");

window.location.href="student-dashboard.html";

}

</script>

</body>
</html>
