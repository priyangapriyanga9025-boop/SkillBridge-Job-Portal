<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillBridge - View Jobs</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
}

header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.container{
width:95%;
max-width:1200px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.totalJobs{
font-size:18px;
font-weight:bold;
color:#0d6efd;
}

#search{
padding:12px;
width:320px;
border:1px solid #ccc;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0d6efd;
color:white;
padding:14px;
}

td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

tr:nth-child(even){
background:#f8f9fa;
}

.update{
background:#198754;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.delete{
background:#dc3545;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.back{
margin-top:25px;
background:#0d6efd;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>
<body>

<header>

<h1>SkillBridge - View Jobs</h1>

</header>

<div class="container">

<div class="top-bar">

<div class="totalJobs">
Total Jobs :
<span id="jobCount">0</span>
</div>

<input
type="text"
id="search"
placeholder="Search Job Title..."
onkeyup="searchJobs()">

</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Job Title</th>
<th>Company</th>
<th>Location</th>
<th>Skills</th>
<th>Action</th>

</tr>

</thead>

<tbody id="jobTable">

</tbody>

</table>

<br>

<button
class="back"
onclick="window.location.href='dashboard.html'">

← Back to Dashboard

</button>

</div>
<script src="api.js"></script>
<script>
    // Load Jobs
loadJobs();

function loadJobs(){


fetch(API_URL + "/jobs")
.then(response=>response.json())

.then(data=>{

document.getElementById("jobCount").innerHTML=data.length;

if(data.length===0){

document.getElementById("jobTable").innerHTML=
"<tr><td colspan='6'>No Jobs Available</td></tr>";

return;

}

let rows="";

data.forEach(job=>{

rows+=`

<tr>

<td>${job.id}</td>

<td>${job.title}</td>

<td>${job.company}</td>

<td>${job.location}</td>

<td>${job.skills}</td>

<td>

<button
class="update"
onclick="applyJob('${job.company}','${job.title}')">

Apply Job

</button>

</td>
</tr>

`;

});

document.getElementById("jobTable").innerHTML=rows;

})

.catch(error=>{

console.log(error);

alert("Unable to Load Jobs");

});

}

// Search Job

function searchJobs(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#jobTable tr");

rows.forEach(row=>{

let title=row.cells[1].innerText.toLowerCase();

if(title.includes(input)){

row.style.display="";

}else{

row.style.display="none";

}

});

}

// Update Job

function editJob(id){

window.location.href="update-job.html?id="+id;

}

// Delete Job

function deleteJob(id){

if(confirm("Are you sure you want to delete this job?")){

fetch(API_URL + "/jobs/" + id,{
method:"DELETE"
})

.then(()=>{

alert("Job Deleted Successfully");

loadJobs();

})

.catch(()=>{

alert("Delete Failed");

});

}

}


// Apply Job


function applyJob(company, title){

let applicantName = prompt("Enter Your Name");

if(!applicantName){

alert("Please login first");

return;

}


let application = {

applicantName: applicantName,

company: company,

jobTitle: title,

resume: "resume.pdf"

};


fetch(API_URL + "/applications/apply",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(application)

})

.then(response=>response.json())

.then(data=>{

alert("Job Applied Successfully");

})

.catch(error=>{

console.log(error);

alert("Application Failed");

});

}



</script>

</body>

</html>
