<!DOCTYPE html>
<html>
<head>
    <title>My Applications</title>

    <style>
        body{
            font-family: Arial;
            background:#f2f6ff;
            text-align:center;
        }

        table{
            margin:auto;
            border-collapse:collapse;
            width:90%;
            background:white;
        }

        th{
            background:#007bff;
            color:white;
        }

        th,td{
            border:1px solid #ccc;
            padding:12px;
        }

        h2{
            margin-top:30px;
        }

        button{
            padding:10px 20px;
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>My Applications</h2>

<table>

<thead>
<tr>
    <th>ID</th>
    <th>Student Email</th>
    <th>Company</th>
    <th>Job Title</th>
    <th>Status</th>
</tr>
</thead>

<tbody id="applicationTable">

</tbody>

</table>

<br>

<button onclick="window.location.href='student-dashboard.html'">
Back to Dashboard
</button>
<script src="api.js"></script>
<script>

let email = localStorage.getItem("studentEmail");

fetch(API_URL + "/applications/student/" + email)
.then(response=>response.json())

.then(data=>{

let rows="";

data.forEach(app=>{

rows+=`
<tr>
<td>${app.id}</td>
<td>${app.applicantName}</td>
<td>${app.company}</td>
<td>${app.jobTitle}</td>
<td>${app.status}</td>
</tr>
`;

});

document.getElementById("applicationTable").innerHTML=rows;

});

</script>

</body>
</html>
