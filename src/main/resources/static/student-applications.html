<!DOCTYPE html>
<html>
<head>
<title>Student Applications</title>

<style>
body{
    font-family:Arial;
    background:#f2f6ff;
    text-align:center;
}

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
}

th{
    background:#007bff;
    color:white;
}

select{
    padding:5px;
}

button{
    padding:8px 15px;
    margin:5px;
}
</style>

</head>

<body>

<h2>Student Applications</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Email</th>
<th>Company</th>
<th>Job Title</th>
<th>Status</th>
<th>Update</th>
<th>Resume</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

loadApplications();

function loadApplications(){

fetch("http://localhost:8080/appliedjobs/all")
.then(res=>res.json())
.then(data=>{

let rows="";

data.forEach(job=>{

rows+=`
<tr>
<td>${job.id}</td>
<td>${job.studentEmail}</td>
<td>${job.company}</td>
<td>${job.title}</td>

<td>${job.status}</td>

<td>

<select onchange="changeStatus(${job.id},this.value)">

<option value="Applied" ${job.status=="Applied"?"selected":""}>Applied</option>

<option value="Shortlisted" ${job.status=="Shortlisted"?"selected":""}>Shortlisted</option>

<option value="Rejected" ${job.status=="Rejected"?"selected":""}>Rejected</option>

</select>

</td>
<td>
<button onclick="downloadResume('${job.studentEmail}')">
Download
</button>
</td>
<td>
<button class="delete"
onclick="deleteApplication(${job.id})">
Delete
</button>
</td>
</tr>

`;

});

document.getElementById("tableBody").innerHTML=rows;

});

}

function changeStatus(id,status){

fetch("http://localhost:8080/appliedjobs/status/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
status:status
})

})

.then(()=>{

alert("Status Updated");

loadApplications();

});

}
function downloadResume(email){

    fetch("http://localhost:8080/resume/list")
    .then(res => res.json())
    .then(data => {

        let resume = data.find(r => r.email === email);

        if(resume){
            window.open("http://localhost:8080/resume/download/" + resume.fileName);
        }else{
            alert("Resume not found");
        }

    });

}
function deleteApplication(id){

fetch("http://localhost:8080/appliedjobs/delete/"+id,{
method:"DELETE"
})

.then(()=>{
alert("Application Deleted Successfully");
loadApplications();
});

}
</script>

</body>
</html>
