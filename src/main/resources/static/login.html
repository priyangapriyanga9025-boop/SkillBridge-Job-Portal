<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillBridge - Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#4f8dfd);
}

.login-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo h1{
    color:#0d6efd;
    font-size:34px;
}

.logo p{
    color:#666;
    margin-top:8px;
}

.input-group{
    margin-top:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border:2px solid #0d6efd;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
    color:#0d6efd;
    font-size:14px;
}

button{
    width:100%;
    margin-top:30px;
    padding:14px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#084298;
}

#result{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.back{
    text-align:center;
    margin-top:20px;
}

.back a{
    text-decoration:none;
    color:#0d6efd;
    font-weight:bold;
}

.back a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<h1>SkillBridge</h1>

<p>Administrator Login</p>

</div>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter your email">

</div>

<div class="input-group">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter your password">

<span onclick="togglePassword()">Show</span>

</div>

</div>

<button onclick="login()">
Login
</button>

<p id="result"></p>

<div class="back">

<a href="index.html">← Back to Home</a>

</div>

</div>

<script>

function togglePassword(){

let password=document.getElementById("password");

if(password.type==="password"){

password.type="text";

event.target.innerHTML="Hide";

}else{

password.type="password";

event.target.innerHTML="Show";

}

}

function login(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(email==="" || password===""){

document.getElementById("result").style.color="red";
document.getElementById("result").innerHTML="Please enter Email and Password";
return;

}

const user={
email:email,
password:password
};

fetch("/users/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(user)

})

.then(response=>response.text())

.then(data=>{

if(data==="Login Successful"){

alert("Welcome Admin!");

window.location.href="dashboard.html";

}
else{

document.getElementById("result").style.color="red";
document.getElementById("result").innerHTML="Invalid Email or Password";

}

})

.catch(()=>{

document.getElementById("result").style.color="red";
document.getElementById("result").innerHTML="Unable to connect to server.";

});

}

</script>

</body>

</html>
