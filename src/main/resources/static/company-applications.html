<!DOCTYPE html>
<html>
<head>
<title>Company Applications</title>

<style>

body{
font-family:Arial;
background:#f4f7fc;
padding:30px;
}

h1{
color:#0d6efd;
}

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#0d6efd;
color:white;
}

</style>

</head>

<body>

<h1>Job Applications</h1>

<table>

<thead>

<tr>
<th>Name</th>
<th>Company</th>
<th>Job Title</th>
<th>Resume</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="applicationTable">

</tbody>

</table>


<script>

fetch("/applications")

.then(response=>response.json())

.then(data=>{


let table="";


data.forEach(app=>{


table += `

<tr>

<td>${app.applicantName}</td>
<td>${app.company}</td>
<td>${app.jobTitle}</td>
<td>${app.resume}</td>
<td>${app.status}</td>

<td>

<button onclick="updateStatus(${app.id},'Accepted')">
Accept
</button>

<button onclick="updateStatus(${app.id},'Rejected')">
Reject
</button>

</td>

</tr>

`;
});


document.getElementById("applicationTable").innerHTML=table;


});
function updateStatus(id,status){

fetch("/applications/update/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
status:status
})

})

.then(response=>response.json())

.then(data=>{

alert("Status Updated");

location.reload();

})

.catch(error=>{

console.log(error);

alert("Update Failed");

});

}


</script>


</body>
</html>
