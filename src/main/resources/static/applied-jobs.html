<!DOCTYPE html>
<html>
<head>
    <title>My Applications</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f6ff;
            margin:0;
        }

        h2{
            text-align:center;
            color:#007bff;
            margin-top:30px;
        }

        table{
            width:90%;
            margin:30px auto;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        tr:nth-child(even){
            background:#f8f8f8;
        }

        button{
            padding:10px 20px;
            margin:20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<h2>My Applications</h2>

<table>

<thead>

<tr>

<th>S.No</th>
<th>Job Title</th>
<th>Company</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<center>

<button onclick="window.location.href='student-dashboard.html'">

Back to Dashboard

</button>

</center>

<script>

loadApplications();

function loadApplications(){

    fetch("http://localhost:8080/appliedjobs/all")

    .then(response => {
        if(!response.ok){
            throw new Error("Server Error");
        }
        return response.json();
    })

    .then(data=>{

        let rows="";
        let count=1;

        let email=localStorage.getItem("studentEmail");

        data.forEach(job=>{

            if(job.studentEmail===email){

                rows+=`
                <tr>
                    <td>${count++}</td>
                    <td>${job.title}</td>
                    <td>${job.company}</td>
                    <td>${job.status}</td>
                </tr>
                `;

            }

        });

        document.getElementById("tableBody").innerHTML=rows;

    })

    .catch(error=>{

        console.log(error);

        alert("Unable to load applications");

    });

}

</script>

</body>
</html>
